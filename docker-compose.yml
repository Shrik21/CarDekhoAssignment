services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-car-advisor-db
    environment:
      POSTGRES_DB: cardekho
      POSTGRES_USER: cardekho
      POSTGRES_PASSWORD: cardekho
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardekho -d cardekho"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ai-car-advisor-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cardekho
      SPRING_DATASOURCE_USERNAME: cardekho
      SPRING_DATASOURCE_PASSWORD: cardekho
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: ai-car-advisor-web
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres-data:
