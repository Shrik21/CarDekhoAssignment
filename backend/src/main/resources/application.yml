spring:
  application:
    name: ai-car-advisor
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cardekho}
    username: ${SPRING_DATASOURCE_USERNAME:cardekho}
    password: ${SPRING_DATASOURCE_PASSWORD:cardekho}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
