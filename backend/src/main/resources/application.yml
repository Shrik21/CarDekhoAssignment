spring:
  application:
    name: ai-car-advisor

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-fancy-lab-atwkfl54.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:neondb_owner}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
